# HouseCheck security — dependency audits, secret scanning, static analysis.
# JS-only jobs (npm audit, CodeQL js/ts) stay dormant until a `frontend/` exists.
name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC — catch newly-disclosed CVEs
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for CodeQL SARIF upload

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_frontend: ${{ steps.check.outputs.has_frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  cargo-audit-deny:
    name: rust deps (audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo-audit (RUSTSEC advisories)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # Licenses are checked out of the CI gate (TLS crates like ring/aws-lc use
      # non-SPDX license expressions that noisily fail); we gate on the security-
      # relevant checks. Run `cargo deny check` locally for the full license report.
      - name: cargo-deny (advisories + bans + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so leaks in old commits are caught
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: frontend deps
    needs: preflight
    if: needs.preflight.outputs.has_frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  codeql:
    name: CodeQL (js/ts)
    needs: preflight
    if: needs.preflight.outputs.has_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

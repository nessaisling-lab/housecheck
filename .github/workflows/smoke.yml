# HouseCheck smoke + stability — boot the API on a fixture DB and prove it answers.
# The server is started, health-checked, and asserted against WITHIN a single step:
# a backgrounded process does not survive across GitHub Actions steps.
name: smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  HOUSECHECK_DB: data/housecheck.test.db
  API_PORT: "8787"
  KNOWN_BBL: "3000010001"   # exists in the fixture DB

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build, serve, and assert
        shell: bash
        run: |
          cargo build -p api -p ingest --locked
          cargo run -p ingest --locked -- --fixture --out "$HOUSECHECK_DB"
          cargo run -p api --locked &
          SERVER_PID=$!
          up=0
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null 2>&1; then up=1; break; fi
            sleep 1
          done
          if [ "$up" != "1" ]; then echo "API never became healthy"; kill "$SERVER_PID" 2>/dev/null || true; exit 1; fi

          body=$(curl -fsS "http://127.0.0.1:${API_PORT}/building/${KNOWN_BBL}")
          echo "$body"
          score=$(echo "$body" | jq '.score.total')
          if [ "$score" -lt 0 ] || [ "$score" -gt 100 ]; then
            echo "score $score out of range"; kill "$SERVER_PID" 2>/dev/null || true; exit 1
          fi

          curl -fsS -X POST "http://127.0.0.1:${API_PORT}/rent-fairness" \
            -H "content-type: application/json" \
            -d "{\"bbl\":\"${KNOWN_BBL}\",\"monthly_rent\":3000}" | tee out.json
          jq -e 'has("pct_vs_median")' out.json

          kill "$SERVER_PID" 2>/dev/null || true
          echo "smoke OK (score=$score)"

  stability:
    name: stability (repeat, no flake)
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Serve and hammer the endpoint 50x
        shell: bash
        run: |
          cargo build -p api -p ingest --locked
          cargo run -p ingest --locked -- --fixture --out "$HOUSECHECK_DB"
          cargo run -p api --locked &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null 2>&1 && break || sleep 1
          done
          fail=0
          for i in $(seq 1 50); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${API_PORT}/building/${KNOWN_BBL}")
            if [ "$code" != "200" ]; then echo "iter $i -> HTTP $code"; fail=1; fi
          done
          kill "$SERVER_PID" 2>/dev/null || true
          if [ "$fail" -eq 0 ]; then echo "50/50 stable"; else echo "instability detected"; exit 1; fi

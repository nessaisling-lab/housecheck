app = "housecheck"
primary_region = "ewr"   # Newark — closest Fly region to NYC

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # scale-to-zero: ~free when idle

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"          # read-only SQLite + Axum is tiny
